<svg width="1536" height="960" viewBox="0 0 1536 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="largeShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="36" flood-color="#26231E" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26231E" flood-opacity="0.08"/>
    </filter>
    <filter id="cardShadow" x="-18%" y="-18%" width="136%" height="144%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#26231E" flood-opacity="0.13"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#26231E" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1536" height="960" rx="44" fill="#F8F3E7"/>
  <rect x="88" y="96" width="1360" height="768" rx="36" fill="#FFFDF5" filter="url(#largeShadow)"/>

  <text x="132" y="158" fill="#211F1C" font-family="Apple SD Gothic Neo, SF Pro Display, Helvetica, Arial, sans-serif" font-size="50" font-weight="850">가볍게 열고, 필요한 창만 읽고, 로컬로 답하기</text>
  <text x="132" y="208" fill="#736B5D" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="23" font-weight="600">Bulby는 메뉴바 앱답게 짧은 입력, 선택 캡처, 로컬 Ollama 분석으로 흐름을 줄입니다.</text>

  <g transform="translate(142 286)">
    <rect width="360" height="354" rx="26" fill="#FFFFFB" filter="url(#cardShadow)"/>
    <rect x="62" y="48" width="236" height="138" rx="28" fill="#EEF1FF"/>
    <rect x="132" y="48" width="96" height="24" rx="12" fill="#211F1C"/>
    <path d="M96 86H264V124C264 145 247 162 226 162H134C113 162 96 145 96 124V86Z" fill="#FFFFFB" filter="url(#cardShadow)"/>
    <rect x="128" y="110" width="104" height="13" rx="6.5" fill="#3356D3"/>
    <rect x="128" y="134" width="66" height="9" rx="4.5" fill="#D8D2C6"/>
    <text x="36" y="246" fill="#3356D3" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="17" font-weight="850">1. 노치 입력</text>
    <text x="36" y="284" fill="#393630" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="650">커서를 올리면 즉시 열리고</text>
    <text x="36" y="314" fill="#393630" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="650">Return으로 바로 분석합니다.</text>
  </g>

  <path d="M528 463H584" stroke="#B8B0A1" stroke-width="4" stroke-linecap="round"/>
  <path d="M572 451L584 463L572 475" stroke="#B8B0A1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(606 286)">
    <rect width="360" height="354" rx="26" fill="#FFFFFB" filter="url(#cardShadow)"/>
    <rect x="46" y="48" width="268" height="152" rx="22" fill="#FFF8EA" filter="url(#cardShadow)"/>
    <rect x="74" y="78" width="112" height="16" rx="8" fill="#D8D2C6"/>
    <rect x="74" y="112" width="208" height="12" rx="6" fill="#E7E0D3"/>
    <rect x="74" y="138" width="176" height="12" rx="6" fill="#E7E0D3"/>
    <rect x="74" y="164" width="220" height="12" rx="6" fill="#E7E0D3"/>
    <rect x="238" y="72" width="50" height="50" rx="14" fill="#EEF1FF"/>
    <path d="M253 97H276M264.5 85V109" stroke="#3356D3" stroke-width="4" stroke-linecap="round"/>
    <text x="36" y="246" fill="#3356D3" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="17" font-weight="850">2. 보이는 창만 캡처</text>
    <text x="36" y="284" fill="#393630" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="650">활성 창을 기본으로 읽고</text>
    <text x="36" y="314" fill="#393630" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="650">선택한 창만 따로 분석합니다.</text>
  </g>

  <path d="M992 463H1048" stroke="#B8B0A1" stroke-width="4" stroke-linecap="round"/>
  <path d="M1036 451L1048 463L1036 475" stroke="#B8B0A1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1070 286)">
    <rect width="360" height="354" rx="26" fill="#FFFFFB" filter="url(#cardShadow)"/>
    <rect x="62" y="58" width="236" height="54" rx="18" fill="#EDFBEF"/>
    <circle cx="94" cy="85" r="9" fill="#22A45D"/>
    <text x="118" y="91" fill="#23663B" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="850">127.0.0.1:11434</text>
    <rect x="62" y="138" width="236" height="66" rx="18" fill="#EEF1FF"/>
    <text x="92" y="172" fill="#3356D3" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="16" font-weight="850">Ollama Vision Model</text>
    <text x="36" y="246" fill="#3356D3" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="17" font-weight="850">3. 로컬 모델로 분석</text>
    <text x="36" y="284" fill="#393630" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="650">클라우드 API 키 없이</text>
    <text x="36" y="314" fill="#393630" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="650">Ollama로만 처리합니다.</text>
  </g>

  <g transform="translate(286 704)" filter="url(#cardShadow)">
    <rect width="964" height="112" rx="26" fill="#FFFFFB"/>
    <rect x="30" y="28" width="58" height="58" rx="16" fill="#EEF1FF"/>
    <path d="M46 58H72M59 45V71" stroke="#3356D3" stroke-width="4" stroke-linecap="round"/>
    <text x="112" y="56" fill="#211F1C" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="21" font-weight="850">대화 히스토리와 이어묻기</text>
    <text x="112" y="86" fill="#736B5D" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">답변은 대화 단위로 저장되고, 결과창이나 히스토리에서 같은 맥락으로 이어 물을 수 있습니다.</text>
    <rect x="742" y="36" width="176" height="40" rx="20" fill="#EDFBEF"/>
    <text x="830" y="62" fill="#23663B" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Text, Helvetica, Arial, sans-serif" font-size="16" font-weight="850">로컬 저장</text>
  </g>
